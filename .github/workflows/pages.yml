# Auto-publish the viewer: any push to main that changes web/ deploys it to GitHub
# Pages (the Pages source is "GitHub Actions", not the old gh-pages branch).
# Manual trigger: gh workflow run pages.yml  (also what `make pages` does now).
name: pages
on:
  push:
    branches: [main]
    paths: ["web/**"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: web
      - id: deployment
        uses: actions/deploy-pages@v4
